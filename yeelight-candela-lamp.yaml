substitutions:
  device_name: yeelight-candela-lamp
  friendly_name: Yeelight Candela Lamp
  # Candle Mode Config
  candle_lo: "0.20f"
  candle_hi: "0.80f"
  candle_delta_min: "0.25f"
  candle_delta_max: "0.45f"
  # Candle Low Config
  candle_low_lo: "0.05f"
  candle_low_hi: "0.40f"
  candle_low_delta_min: "0.10f"
  candle_low_delta_max: "0.30f"
  # Timing
  candle_delay_step_base: "60"   # step 60..111 ms
  candle_delay_step_rand: "51"
  candle_delay_dwell_base: "120" # dwell 120..300 ms
  candle_delay_dwell_rand: "181"
  # Rotary Config
  rotary_step: "0.2f"

globals:
  - id: led_pwm_level
    type: float
    initial_value: '0.0'
    restore_value: no
  - id: enc_skip_once
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ab_start
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ab_target
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ab_steps
    type: int
    restore_value: no
    initial_value: '0'
  - id: ab_delay_ms
    type: int
    restore_value: no
    initial_value: '0'
  - id: ab_i
    type: int
    restore_value: no
    initial_value: '0'
  - id: enc_last_dir
    type: int
    restore_value: no
    initial_value: '0'
  - id: enc_last_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: candle_last_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: flame_low
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: flame_start
    type: float
    restore_value: no
    initial_value: '0.6'
  - id: flame_target
    type: float
    restore_value: no
    initial_value: '0.6'
  - id: flame_steps
    type: int
    restore_value: no
    initial_value: '10'
  - id: flame_i
    type: int
    restore_value: no
    initial_value: '0'
  - id: light_internal_update
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: candle_exit_keep_light_off
    type: bool
    restore_value: no
    initial_value: 'false'

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: ESP32 Code to mimic the original ${friendly_name}
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: light1
          brightness: 0
          transition_length: 0ms
      - light.turn_off: light1

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: IP_ADDRESS
    gateway: 192.168.1.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Hotspot"
    password: HOTSPOT_PASSWORD

captive_portal:

ota:
  - platform: esphome
    password: OTA_PASSWORD

# Enable Home Assistant API
api:
  encryption:
    key: API_ENCRYPTION_KEY

# Enable Web server
#web_server:
#  port: 80

# Sync time with Home Assistant
time:
  - platform: homeassistant
    id: homeassistant_time

text_sensor:
